{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Updated — Junk Busters Customer Portal</title>
  <link rel="stylesheet" href="{% static 'css/site.css' %}">
  <style>
    body { background:#f1f5f9; min-height:100vh; display:flex; flex-direction:column; }
    .auth-nav { background:var(--navy-dark); border-bottom:3px solid var(--yellow); padding:0 24px; display:flex; align-items:center; justify-content:space-between; height:56px; }
    .auth-nav .brand { font-size:17px; font-weight:900; color:#fff; text-decoration:none; }
    .auth-nav .brand span { color:var(--yellow); }
    .auth-wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:40px 20px; }
    .auth-card { background:#fff; border-radius:16px; box-shadow:0 4px 24px rgba(0,0,0,0.08); padding:48px 40px; width:100%; max-width:420px; text-align:center; }
    @media(max-width:480px) { .auth-card { padding:32px 24px; } }
    .icon { font-size:52px; margin-bottom:16px; }
    .auth-card h1 { font-size:22px; font-weight:800; color:var(--navy-dark); margin-bottom:12px; }
    .auth-card p { font-size:14px; color:var(--text-muted); line-height:1.6; margin-bottom:20px; }
    .auth-divider { border:none; border-top:1px solid #f1f5f9; margin:20px 0; }
    .auth-links { margin-top:4px; font-size:13px; color:var(--text-muted); }
    .auth-links a { color:var(--yellow-dark); font-weight:700; text-decoration:none; }
    .auth-links a:hover { text-decoration:underline; }
  </style>
</head>
<body>

<div class="auth-nav">
  <a href="/" class="brand">Junk<span>Busters</span></a>
</div>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="icon">✅</div>
    <h1>Password Updated!</h1>
    <p>Your password has been changed successfully. You can now sign in with your new password.</p>
    <a href="/portal/" class="btn btn-yellow" style="display:inline-block;padding:13px 32px;font-size:16px;text-decoration:none;">Sign In</a>

    <hr class="auth-divider">

    <div class="auth-links">
      Need help?
      <a href="tel:615-881-2505">Call 615-881-2505</a>
    </div>
  </div>
</div>

</body>
</html>
