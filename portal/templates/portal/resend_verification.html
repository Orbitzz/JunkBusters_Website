{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resend Verification — Junk Busters Customer Portal</title>
  <link rel="stylesheet" href="{% static 'css/site.css' %}">
  <style>
    body { background:#f1f5f9; min-height:100vh; display:flex; flex-direction:column; }
    .auth-nav { background:var(--navy-dark); border-bottom:3px solid var(--yellow); padding:0 24px; display:flex; align-items:center; justify-content:space-between; height:56px; }
    .auth-nav .brand { font-size:17px; font-weight:900; color:#fff; text-decoration:none; }
    .auth-nav .brand span { color:var(--yellow); }
    .auth-nav a.back { font-size:13px; color:#90a4ae; text-decoration:none; font-weight:600; }
    .auth-nav a.back:hover { color:#fff; }
    .auth-wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:40px 20px; }
    .auth-card { background:#fff; border-radius:16px; box-shadow:0 4px 24px rgba(0,0,0,0.08); padding:48px 40px; width:100%; max-width:420px; }
    @media(max-width:480px) { .auth-card { padding:32px 24px; } }
    .auth-logo { text-align:center; margin-bottom:28px; }
    .auth-logo img { width:110px; height:110px; object-fit:contain; mix-blend-mode:multiply; margin-bottom:8px; }
    .auth-logo h1 { font-size:22px; font-weight:800; color:var(--navy-dark); margin-bottom:4px; }
    .auth-logo p { font-size:13px; color:var(--text-muted); }
    .auth-field { margin-bottom:18px; }
    .auth-field label { display:block; font-size:12px; font-weight:700; color:var(--navy-dark); text-transform:uppercase; letter-spacing:0.4px; margin-bottom:6px; }
    .auth-field input { width:100%; padding:12px 14px; border:1.5px solid #d1d5db; border-radius:7px; font-size:15px; font-family:inherit; box-sizing:border-box; transition:border-color .15s; }
    .auth-field input:focus { outline:none; border-color:var(--yellow-dark); }
    .auth-submit { width:100%; padding:14px; font-size:16px; margin-top:4px; }
    .auth-links { margin-top:20px; text-align:center; font-size:13px; color:var(--text-muted); line-height:1.8; }
    .auth-links a { color:var(--yellow-dark); font-weight:700; text-decoration:none; }
    .auth-links a:hover { text-decoration:underline; }
    .auth-divider { border:none; border-top:1px solid #f1f5f9; margin:20px 0; }
  </style>
</head>
<body>

<div class="auth-nav">
  <a href="/" class="brand">Junk<span>Busters</span></a>
  <a href="/portal/" class="back">← Back to login</a>
</div>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="{% static 'img/logo.png' %}" alt="Junk Busters">
      <h1>Resend Verification</h1>
      <p>Enter your email and we'll send a new verification link.</p>
    </div>

    <form method="post">
      {% csrf_token %}
      <div class="auth-field">
        <label for="email">Email Address</label>
        <input type="email" name="email" id="email" required autofocus placeholder="your@email.com">
      </div>
      <button type="submit" class="btn btn-yellow auth-submit">Send Verification Link</button>
    </form>

    <hr class="auth-divider">

    <div class="auth-links">
      Already verified?
      <a href="/portal/">Sign in</a><br>
      Need help?
      <a href="tel:615-881-2505">Call 615-881-2505</a>
    </div>
  </div>
</div>

</body>
</html>
