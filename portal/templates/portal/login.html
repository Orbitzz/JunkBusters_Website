{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Login — JunkBusters</title>
  <link rel="stylesheet" href="{% static 'css/site.css' %}">
</head>
<body style="background:var(--gray);min-height:100vh;display:flex;flex-direction:column;">

<nav class="portal-nav">
  <div class="container">
    <a href="/" class="brand">Junk<span>Busters</span></a>
    <div class="nav-right">
      <a href="/">Back to Website</a>
    </div>
  </div>
</nav>

<div style="flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;">
  <div style="background:white;border-radius:16px;padding:48px 40px;max-width:420px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,0.08);">
    <div style="text-align:center;margin-bottom:28px;">
      <div style="font-size:42px;margin-bottom:12px;">👤</div>
      <h1 style="font-size:24px;font-weight:800;color:var(--navy-dark);margin-bottom:6px;">Customer Portal</h1>
      <p style="font-size:14px;color:var(--text-muted);">Enter the email address on your account to view your jobs and invoices.</p>
    </div>

    {% if error %}
    <div style="background:#fee2e2;border:1px solid #fca5a5;color:#dc2626;padding:12px 16px;border-radius:8px;font-size:14px;margin-bottom:20px;">
      {{ error }}
    </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="form-group" style="margin-bottom:20px;">
        <label for="email" style="font-size:13px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:6px;">Email Address</label>
        <input type="email" name="email" id="email" required autofocus
          style="width:100%;padding:12px 14px;border:1.5px solid #d1d5db;border-radius:6px;font-size:15px;"
          placeholder="your@email.com">
      </div>
      <button type="submit" class="btn btn-yellow" style="width:100%;padding:14px;font-size:16px;">
        Access My Account
      </button>
    </form>

    <p style="margin-top:20px;text-align:center;font-size:13px;color:var(--text-muted);">
      Don't have an account yet? <a href="/quote/" style="color:var(--yellow-dark);font-weight:700;">Get a Quote</a>
    </p>
    <p style="margin-top:8px;text-align:center;font-size:13px;color:var(--text-muted);">
      Need help? Call <a href="tel:615-881-2505" style="color:var(--yellow-dark);font-weight:700;">615-881-2505</a>
    </p>
  </div>
</div>
</body>
</html>
